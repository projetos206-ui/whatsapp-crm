<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WhatsApp CRM - Multi Instâncias</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #111b21;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ==================== SIDEBAR ==================== */
        .sidebar {
            width: 400px;
            background: #111b21;
            border-right: 1px solid #2a2f32;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header do sidebar */
        .sidebar-header {
            background: #202c33;
            padding: 16px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h2 {
            font-size: 19px;
            font-weight: 600;
            color: #e9edef;
        }

        .header-actions {
            display: flex;
            gap: 16px;
        }

        .header-icon {
            color: #aebac1;
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .header-icon:hover {
            color: #e9edef;
        }

        /* Seletor de instância - estilo WhatsApp */
        .instance-selector {
            padding: 12px 16px;
            background: #202c33;
            border-bottom: 1px solid #2a2f32;
        }

        .instance-selector label {
            display: block;
            font-size: 12px;
            color: #8696a0;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .instance-selector select {
            width: 100%;
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            background: #2a2f32;
            font-size: 14px;
            font-weight: 500;
            color: #e9edef;
            cursor: pointer;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23aebac1' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }

        .instance-selector select option {
            background: #2a2f32;
            color: #e9edef;
        }

        /* Busca */
        .search-box {
            padding: 8px 16px;
            background: #111b21;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px;
            border: none;
            background: #202c33;
            border-radius: 24px;
            font-size: 14px;
            color: #e9edef;
            outline: none;
        }

        .search-box input::placeholder {
            color: #8696a0;
        }

        /* Lista de conversas */
        .conversations-list {
            flex: 1;
            overflow-y: auto;
        }

        .conversations-list::-webkit-scrollbar {
            width: 6px;
        }

        .conversations-list::-webkit-scrollbar-track {
            background: #111b21;
        }

        .conversations-list::-webkit-scrollbar-thumb {
            background: #2a2f32;
            border-radius: 3px;
        }

        .conversation-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #2a2f32;
        }

        .conversation-item:hover {
            background: #2a2f32;
        }

        .conversation-item.active {
            background: #2a2f32;
        }

        .avatar {
            width: 49px;
            height: 49px;
            border-radius: 50%;
            background: linear-gradient(135deg, #25D366, #128C7E);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .conversation-info {
            flex: 1;
            min-width: 0;
        }

        .conversation-name {
            font-weight: 500;
            color: #e9edef;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .conversation-last-message {
            font-size: 13px;
            color: #8696a0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conversation-meta {
            text-align: right;
            flex-shrink: 0;
        }

        .conversation-time {
            font-size: 11px;
            color: #8696a0;
            margin-bottom: 4px;
        }

        .unread-badge {
            background: #25D366;
            color: #111b21;
            border-radius: 16px;
            min-width: 20px;
            height: 20px;
            font-size: 11px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
        }

        .instance-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            background: #2a2f32;
            color: #8696a0;
        }

        /* ==================== CHAT AREA ==================== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #222e35;
            height: 100vh;
        }

        /* Chat Header */
        .chat-header {
            background: #202c33;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 1px solid #2a2f32;
        }

        .back-button {
            display: none;
            background: none;
            border: none;
            color: #aebac1;
            font-size: 24px;
            cursor: pointer;
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #25D366, #128C7E);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
        }

        .chat-info h3 {
            font-size: 16px;
            font-weight: 500;
            color: #e9edef;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chat-info p {
            font-size: 12px;
            color: #8696a0;
        }

        .chat-actions {
            display: flex;
            gap: 20px;
        }

        .chat-action {
            color: #aebac1;
            cursor: pointer;
            font-size: 20px;
        }

        /* Mensagens */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 60px;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 10% 30%, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 8px 8px;
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: #222e35;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: #2a2f32;
            border-radius: 3px;
        }

        .message {
            max-width: 65%;
            margin-bottom: 4px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .message.incoming {
            align-items: flex-start;
        }

        .message.outgoing {
            align-items: flex-end;
            margin-left: auto;
        }

        .message-bubble {
            padding: 8px 12px;
            border-radius: 8px;
            word-wrap: break-word;
            position: relative;
        }

        .message.incoming .message-bubble {
            background: #202c33;
            border-radius: 8px 8px 8px 0;
        }

        .message.outgoing .message-bubble {
            background: #005c4b;
            border-radius: 8px 8px 0 8px;
        }

        .message-text {
            font-size: 14px;
            color: #e9edef;
            line-height: 1.4;
        }

        .message-meta {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 4px;
        }

        .message-time {
            font-size: 10px;
            color: #8696a0;
        }

        .message-status {
            font-size: 12px;
            color: #8696a0;
        }

        .sender-number {
            font-size: 11px;
            color: #25D366;
            margin-bottom: 2px;
            font-weight: 500;
        }

        /* Input area */
        .input-area {
            background: #202c33;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-top: 1px solid #2a2f32;
        }

        .input-attach {
            color: #aebac1;
            cursor: pointer;
            font-size: 22px;
        }

        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 24px;
            background: #2a2f32;
            font-size: 14px;
            color: #e9edef;
            outline: none;
        }

        .input-area input::placeholder {
            color: #8696a0;
        }

        .input-area button {
            background: #005c4b;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .input-area button:hover {
            background: #006f5a;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #8696a0;
            gap: 16px;
        }

        .empty-state-icon {
            font-size: 64px;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #8696a0;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                z-index: 100;
                transition: transform 0.3s;
            }
            .sidebar.hidden {
                transform: translateX(-100%);
            }
            .chat-area {
                width: 100%;
            }
            .back-button {
                display: block;
            }
            .messages-container {
                padding: 20px;
            }
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>WhatsApp CRM</h2>
            <div class="header-actions">
                <span class="header-icon">📱</span>
                <span class="header-icon">⚙️</span>
            </div>
        </div>
        <div class="instance-selector">
            <label>📱 Número do WhatsApp</label>
            <select id="instanceSelect">
                <option value="instance1">📱 +55 11 99999-9991 - Vendas</option>
                <option value="instance2">📱 +55 11 99999-9992 - Suporte</option>
                <option value="instance3">📱 +55 11 99999-9993 - Financeiro</option>
                <option value="instance4">📱 +55 11 99999-9994 - Atendimento</option>
                <option value="instance5">📱 +55 11 99999-9995 - Comercial</option>
                <option value="instance6">📱 +55 11 99999-9996 - Marketing</option>
                <option value="instance7">📱 +55 11 99999-9997 - SAC</option>
            </select>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Pesquisar conversa...">
        </div>
        <div class="conversations-list" id="conversationsList">
            <div class="loading">📱 Carregando conversas...</div>
        </div>
    </div>

    <div class="chat-area" id="chatArea" style="display: none;">
        <div class="chat-header">
            <button class="back-button" id="backButton" onclick="closeChat()">←</button>
            <div class="chat-avatar" id="chatAvatar">?</div>
            <div class="chat-info">
                <h3 id="chatName">Selecione uma conversa</h3>
                <p id="chatStatus">Clique em uma conversa para começar</p>
            </div>
            <div class="chat-actions">
                <span class="chat-action">🔍</span>
                <span class="chat-action">📌</span>
                <span class="chat-action">⋮</span>
            </div>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div class="empty-state">
                <div class="empty-state-icon">💬</div>
                <div>
                    <p>Selecione uma conversa</p>
                    <p style="font-size: 12px;">para começar a conversar</p>
                </div>
            </div>
        </div>
        <div class="input-area">
            <span class="input-attach">📎</span>
            <span class="input-attach">😊</span>
            <input type="text" id="messageInput" placeholder="Digite sua mensagem..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        let currentPhone = null;
        let currentInstance = 'instance1';
        let currentInstancePhone = '+55 11 99999-9991';
        let conversations = [];
        let pollInterval = null;

        // Mapeamento de instâncias com números reais
        const instanceConfig = {
            instance1: { name: 'WhatsApp Vendas', phone: '+55 11 99999-9991', color: '#25D366' },
            instance2: { name: 'WhatsApp Suporte', phone: '+55 11 99999-9992', color: '#128C7E' },
            instance3: { name: 'WhatsApp Financeiro', phone: '+55 11 99999-9993', color: '#075E54' },
            instance4: { name: 'WhatsApp Atendimento', phone: '+55 11 99999-9994', color: '#34B7F1' },
            instance5: { name: 'WhatsApp Comercial', phone: '+55 11 99999-9995', color: '#1DA1F2' },
            instance6: { name: 'WhatsApp Marketing', phone: '+55 11 99999-9996', color: '#7C3AED' },
            instance7: { name: 'WhatsApp SAC', phone: '+55 11 99999-9997', color: '#EC4899' }
        };

        // Carregar conversas
        async function loadConversations() {
            try {
                const response = await fetch(`/api/conversations?instance=${currentInstance}`);
                const data = await response.json();
                conversations = data.conversations || [];
                renderConversations();
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        // Renderizar lista de conversas
        function renderConversations() {
            const container = document.getElementById('conversationsList');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = conversations.filter(conv => 
                (conv.name || '').toLowerCase().includes(searchTerm) || 
                (conv.phone || '').includes(searchTerm)
            );

            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">📱 Nenhuma conversa encontrada</div>';
                return;
            }

            container.innerHTML = filtered.map(conv => `
                <div class="conversation-item" onclick="selectConversation('${conv.phone}', '${escapeHtml(conv.name || conv.phone)}')">
                    <div class="avatar">${(conv.name || conv.phone).charAt(0).toUpperCase()}</div>
                    <div class="conversation-info">
                        <div class="conversation-name">
                            ${escapeHtml(conv.name || conv.phone)}
                            ${conv.unreadCount > 0 ? `<span class="unread-badge">${conv.unreadCount}</span>` : ''}
                        </div>
                        <div class="conversation-last-message">${escapeHtml(conv.lastMessage || 'Clique para abrir')}</div>
                    </div>
                    <div class="conversation-meta">
                        <div class="conversation-time">${conv.lastTime ? formatTime(conv.lastTime) : ''}</div>
                    </div>
                </div>
            `).join('');
        }

        // Selecionar conversa
        async function selectConversation(phone, name) {
            currentPhone = phone;
            
            document.getElementById('chatArea').style.display = 'flex';
            document.getElementById('chatName').innerHTML = `${escapeHtml(name)} <span class="instance-badge">${instanceConfig[currentInstance].phone}</span>`;
            document.getElementById('chatAvatar').innerText = name.charAt(0).toUpperCase();
            document.getElementById('chatStatus').innerHTML = `📱 ${instanceConfig[currentInstance].name} • online`;
            
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('hidden');
            }
            
            await loadMessages(phone);
            startPolling(phone);
            
            await fetch('/api/mark-read', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, instanceName: currentInstance })
            });
        }

        // Carregar mensagens
        async function loadMessages(phone) {
            try {
                const response = await fetch(`/api/messages?instanceName=${currentInstance}&phone=${phone}`);
                const data = await response.json();
                renderMessages(data.messages || []);
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        // Renderizar mensagens com número do WhatsApp
        function renderMessages(messages) {
            const container = document.getElementById('messagesContainer');
            
            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div><div><p>Nenhuma mensagem ainda</p><p style="font-size: 12px;">Envie uma mensagem para começar</p></div></div>';
                return;
            }

            container.innerHTML = messages.map(msg => {
                const isOutgoing = msg.direction === 'outbound';
                const senderNumber = isOutgoing ? instanceConfig[currentInstance].phone : msg.phone;
                
                return `
                    <div class="message ${isOutgoing ? 'outgoing' : 'incoming'}">
                        <div class="sender-number">📱 ${senderNumber}</div>
                        <div class="message-bubble">
                            <div class="message-text">${escapeHtml(msg.message)}</div>
                            <div class="message-meta">
                                <span class="message-time">${formatTime(msg.timestamp)}</span>
                                <span class="message-status">${isOutgoing ? '✓✓' : '✓'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        // Enviar mensagem
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!currentPhone || !message) return;
            
            try {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instanceName: currentInstance,
                        phone: currentPhone,
                        message: message
                    })
                });
                
                if (response.ok) {
                    input.value = '';
                    await loadMessages(currentPhone);
                    
                    const conv = conversations.find(c => c.phone === currentPhone);
                    if (conv) {
                        conv.lastMessage = message;
                        conv.lastTime = new Date().toISOString();
                        renderConversations();
                    }
                } else {
                    const error = await response.json();
                    alert('Erro: ' + error.error);
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao enviar mensagem');
            }
        }

        function closeChat() {
            document.getElementById('sidebar').classList.remove('hidden');
            if (pollInterval) clearInterval(pollInterval);
            currentPhone = null;
        }

        function startPolling(phone) {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                if (currentPhone === phone) {
                    await loadMessages(phone);
                    await loadConversations();
                }
            }, 3000);
        }

        // Mudança de instância
        document.getElementById('instanceSelect').addEventListener('change', async (e) => {
            currentInstance = e.target.value;
            currentInstancePhone = instanceConfig[currentInstance].phone;
            currentPhone = null;
            document.getElementById('chatArea').style.display = 'none';
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('hidden');
            }
            await loadConversations();
        });

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        document.getElementById('searchInput').addEventListener('input', () => renderConversations());

        loadConversations();
        setInterval(loadConversations, 5000);
    </script>
</body>
</html>
