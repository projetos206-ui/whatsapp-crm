<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador WhatsApp CRM - 7 Conexões</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #111b21;
            color: #e9edef;
            padding: 20px;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header p {
            color: #8696a0;
        }

        .instances-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .instance-card {
            background: #202c33;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #2a2f32;
        }

        .card-header {
            background: #2a2f32;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3a3f42;
        }

        .card-header h3 {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-connected {
            background: #25D366;
            color: #111b21;
        }

        .status-disconnected {
            background: #dc3545;
            color: white;
        }

        .status-connecting {
            background: #ffc107;
            color: #111b21;
        }

        .card-body {
            padding: 16px;
        }

        .qr-container {
            background: white;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            margin-bottom: 16px;
        }

        .qr-container img {
            max-width: 200px;
            border-radius: 8px;
        }

        .qr-placeholder {
            width: 200px;
            height: 200px;
            background: #2a2f32;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8696a0;
            margin: 0 auto;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a2f32;
            font-size: 14px;
        }

        .info-label {
            color: #8696a0;
        }

        .info-value {
            font-weight: 500;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #25D366;
            color: #111b21;
        }

        .btn-primary:hover {
            background: #128C7E;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-secondary {
            background: #2a2f32;
            color: #e9edef;
        }

        .btn-secondary:hover {
            background: #3a3f42;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-top: 20px;
            padding: 20px;
            background: #202c33;
            border-radius: 16px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #25D366;
        }

        .stat-label {
            font-size: 12px;
            color: #8696a0;
            margin-top: 4px;
        }

        .refresh-btn {
            background: #25D366;
            color: #111b21;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8696a0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📱 Gerenciador WhatsApp CRM</h1>
        <p>Gerencie as 7 conexões do WhatsApp - Escaneie o QR Code para conectar cada número</p>
    </div>

    <button class="refresh-btn" onclick="loadAllStatus()">🔄 Atualizar Todos</button>

    <div class="instances-grid" id="instancesGrid">
        <div class="loading">Carregando...</div>
    </div>

    <div class="stats" id="stats">
        <div class="stat-item">
            <div class="stat-number" id="totalCount">0</div>
            <div class="stat-label">Total de Instâncias</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="connectedCount">0</div>
            <div class="stat-label">Conectadas</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="disconnectedCount">0</div>
            <div class="stat-label">Desconectadas</div>
        </div>
    </div>

    <script>
        const instances = [
            { id: 'instance1', name: 'WhatsApp Vendas', phone: '+55 11 99999-9991', session: 'vendas' },
            { id: 'instance2', name: 'WhatsApp Suporte', phone: '+55 11 99999-9992', session: 'suporte' },
            { id: 'instance3', name: 'WhatsApp Financeiro', phone: '+55 11 99999-9993', session: 'financeiro' },
            { id: 'instance4', name: 'WhatsApp Atendimento', phone: '+55 11 99999-9994', session: 'atendimento' },
            { id: 'instance5', name: 'WhatsApp Comercial', phone: '+55 11 99999-9995', session: 'comercial' },
            { id: 'instance6', name: 'WhatsApp Marketing', phone: '+55 11 99999-9996', session: 'marketing' },
            { id: 'instance7', name: 'WhatsApp SAC', phone: '+55 11 99999-9997', session: 'sac' }
        ];

        let qrCodes = {};
        let statuses = {};

        async function loadAllStatus() {
            try {
                const response = await fetch('/api/wpp/status');
                const data = await response.json();
                statuses = data.statuses || {};
                qrCodes = data.qrcodes || {};
                renderInstances();
                updateStats();
            } catch (error) {
                console.error('Erro ao carregar status:', error);
            }
        }

        async function startSession(instanceId, sessionName) {
            try {
                const response = await fetch(`/api/wpp/start/${instanceId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session: sessionName })
                });
                const result = await response.json();
                if (result.success) {
                    setTimeout(() => loadAllStatus(), 2000);
                }
            } catch (error) {
                console.error('Erro ao iniciar sessão:', error);
            }
        }

        async function disconnectSession(instanceId) {
            if (confirm('Tem certeza que deseja desconectar este número?')) {
                try {
                    await fetch(`/api/wpp/disconnect/${instanceId}`, { method: 'POST' });
                    setTimeout(() => loadAllStatus(), 1000);
                } catch (error) {
                    console.error('Erro ao desconectar:', error);
                }
            }
        }

        async function getQRCode(instanceId) {
            try {
                const response = await fetch(`/api/wpp/qrcode/${instanceId}`);
                const data = await response.json();
                if (data.qrcode) {
                    return data.qrcode;
                }
                return null;
            } catch (error) {
                return null;
            }
        }

        function renderInstances() {
            const container = document.getElementById('instancesGrid');
            
            container.innerHTML = instances.map(inst => {
                const status = statuses[inst.id] || 'disconnected';
                const qrcode = qrCodes[inst.id];
                
                let statusText = '';
                let statusClass = '';
                let qrHtml = '';
                
                switch(status) {
                    case 'connected':
                        statusText = 'Conectado';
                        statusClass = 'status-connected';
                        qrHtml = '<div class="qr-placeholder">✅ Conectado</div>';
                        break;
                    case 'connecting':
                        statusText = 'Conectando...';
                        statusClass = 'status-connecting';
                        qrHtml = '<div class="qr-placeholder">⏳ Aguardando...</div>';
                        break;
                    default:
                        statusText = 'Desconectado';
                        statusClass = 'status-disconnected';
                        if (qrcode) {
                            qrHtml = `
                                <div class="qr-container">
                                    <img src="${qrcode}" alt="QR Code">
                                    <p style="margin-top: 10px; font-size: 12px; color: #8696a0;">Escaneie com o WhatsApp</p>
                                </div>
                            `;
                        } else {
                            qrHtml = '<div class="qr-placeholder">📱 Clique em "Iniciar" para conectar</div>';
                        }
                }
                
                return `
                    <div class="instance-card">
                        <div class="card-header">
                            <h3>
                                📱 ${inst.name}
                                <span class="status-badge ${statusClass}">${statusText}</span>
                            </h3>
                            <span style="font-size: 12px; color: #8696a0;">${inst.phone}</span>
                        </div>
                        <div class="card-body">
                            ${qrHtml}
                            <div class="info-row">
                                <span class="info-label">ID da Instância</span>
                                <span class="info-value">${inst.id}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Sessão</span>
                                <span class="info-value">${inst.session}</span>
                            </div>
                            <div class="button-group">
                                ${status !== 'connected' ? `
                                    <button class="btn btn-primary" onclick="startSession('${inst.id}', '${inst.session}')">
                                        🔌 Iniciar Conexão
                                    </button>
                                ` : `
                                    <button class="btn btn-danger" onclick="disconnectSession('${inst.id}')">
                                        🔌 Desconectar
                                    </button>
                                `}
                                <button class="btn btn-secondary" onclick="loadAllStatus()">
                                    🔄 Atualizar
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            const total = instances.length;
            const connected = Object.values(statuses).filter(s => s === 'connected').length;
            const disconnected = total - connected;
            
            document.getElementById('totalCount').innerText = total;
            document.getElementById('connectedCount').innerText = connected;
            document.getElementById('disconnectedCount').innerText = disconnected;
        }

        loadAllStatus();
        setInterval(loadAllStatus, 10000);
    </script>
</body>
</html>
